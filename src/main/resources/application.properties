spring.application.name=fraud-detection

# Postgres / PGVector
spring.datasource.url=jdbc:postgresql://db:5432/fraud_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Spring AI PGVector Store
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.dimensions=768

# Spring AI - Configuração da IA (Via API em Nuvem)
# O modelo padrão usa Google Gemini (via compatibilidade OpenAI) para processar Multimodalidade sem pesar o Codespaces.
spring.ai.openai.api-key=${OPENAI_API_KEY:sua-chave-aqui}
spring.ai.openai.base-url=${OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai/}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gemini-1.5-flash}
spring.ai.openai.embedding.options.model=${OPENAI_EMBEDDING_MODEL:text-embedding-004}

# S3 / MinIO Settings (Custom Properties)
minio.url=http://minio:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=fraud-images

# Langfuse Configuration (Custom Properties)
langfuse.base-url=http://langfuse:3000
langfuse.secret-key=sk-lf-...
langfuse.public-key=pk-lf-...

# Kafka Configuration
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.consumer.group-id=fraud-group
spring.kafka.consumer.auto-offset-reset=earliest

# Actuator / Observability
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
