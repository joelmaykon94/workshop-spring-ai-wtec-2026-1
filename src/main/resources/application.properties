spring.application.name=fraud-detection

# Postgres / PGVector
spring.datasource.url=jdbc:postgresql://localhost:5432/fraud_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Spring AI PGVector Store
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.dimensions=768

# Spring AI Ollama
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2-vision
spring.ai.ollama.embedding.options.model=nomic-embed-text

# S3 / MinIO Settings (Custom Properties)
minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=fraud-images

# Langfuse Configuration (Custom Properties)
langfuse.base-url=http://localhost:3000
langfuse.secret-key=sk-lf-...
langfuse.public-key=pk-lf-...

# Actuator / Observability
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
